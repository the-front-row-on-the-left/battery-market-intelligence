project_name: battery_strategy_multi_agent

llm:
  provider: openai
  model: gpt-4.1-mini
  temperature: 0.1
  max_output_tokens: 4000

retrieval:
  embedding_model: BAAI/bge-m3
  reranker_model: BAAI/bge-reranker-v2-m3
  embedding_batch_size: 4
  embedding_max_seq_length: 512
  chunk_size_tokens: 900
  chunk_overlap_tokens: 120
  dense_top_k: 8
  sparse_top_k: 8
  final_top_k: 8
  use_reranker: false
  index_dir: outputs/index

web_search:
  enabled: true
  provider: duckduckgo
  region: kr-kr
  max_results_per_query: 5
  fetch_full_text: true

execution:
  max_bias_retries: 2
  max_subgraph_balance_retries: 1
  output_dir: outputs

workflow:
  companies:
    - LGES
    - CATL
  comparison_axes:
    - portfolio
    - commercialization
    - manufacturing
    - technology
    - ecosystem
    - risk
    - strategy_horizon
  criteria:
    - SUMMARY 및 REFERENCE 포함
    - 동일 비교축 기반 분석
    - 모든 주장에 출처 연결
    - 정량 데이터 우선
    - 2024~2026 자료 우선 사용
    - SWOT 내부/외부 요인 엄격 분리
    - 웹검색 편향 검증 수행

data_manifest_path: configs/data_manifest.yaml
